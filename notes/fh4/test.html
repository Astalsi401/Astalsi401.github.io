<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>toggle-jquery1.9</title>
<script src="https://cdn.staticfile.org/jquery/1.10.2/jquery.min.js"></script>
<script>
$(document).ready(function(){
$('#a').click(function(){
$('.left').animate({width:"toggle"},350);
});
});
</script>
<style>
div.container {
height: 320px;
border: 1px solid #ccc;
}
div.left {
width: 200px;
height: 300px;
background-color: #36f;
}
</style>
</head>
<body>
<div class="container">
<div class="left"></div>
</div>
<p id="a">toggle</p>
</body>
</html>
