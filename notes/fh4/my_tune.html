	<script>
		function tuneSearch() {
			var input, filter, table, tr, td, i;
			input = document.getElementById("tune_search");
			filter = input.value.toUpperCase(); //toUpperCase()是不區分大小寫
			table = document.getElementById("tune_table");
			tr = table.getElementsByTagName("tr");
			// 迴圈表格每一行，查詢匹配項
		 	for (i = 0; i < tr.length; i++) {
		 		td = tr[i].getElementsByTagName("td")[0,1,2,3,4,5];
		    	if (td) {
		    		if (td.innerHTML.toUpperCase().indexOf(filter) > -1) {  //如果要區分大小寫就去掉這個toUpperCase()
		    			tr[i].style.display = "";
					}
					else {
						tr[i].style.display = "none";
					}
				}
			}
		}
	</script>
	<div class="container">
		<h1 id="tune_share">FH4調教分(施工中)</h1>
		<center>
			<input type="text" id="tune_search" class="tune_search" placeholder="輸入關鍵字">
			<button onclick="tuneSearch()">搜尋</button>
			<table id="tune_table" style="text-align: center;">
