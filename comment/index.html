<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="stylesheet" href="main.css">
	<title>Comment</title>
</head>
<body>
	<div class="container">
		<div class="comment-send">
			<form id="commentForm" method="GET" action="https://astalsi401.github.io/comment">
				<textarea class="comment-send-input" name="comment" form="commentForm" cols="80" rows="5" placeholder="輸入評論..."></textarea>
				<input class="comment-send-button" type="submit" value="發表評論">			
			</form>
		</div>
		<div class="comment-list" id="commentList">
		</div>
	</div>
</body>
</html>
