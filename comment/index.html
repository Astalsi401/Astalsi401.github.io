<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="stylesheet" href="main.css">
	<title>Comment</title>
</head>
<body>
	<div class="container">
		<div class="comment-send">
			<form id="commentForm" method="GET" action="https://astalsi401.github.io/comment">
				<textarea class="comment-send-input" name="comment" form="commentForm" cols="80" rows="5" placeholder="輸入評論..."></textarea>
				<input class="comment-send-button" type="submit" value="發表評論">			
			</form>
		</div>
		<div class="comment-list" id="commentList">
			<div class="comment">
				<div class="comment-content">
					<p class="comment-content-name">EdmundDZhang</p>
					<p class="comment-content-article">驚了</p>
					<p class="comment-content-footer">
						<span class="comment-content-footer-id">#2</span>
						<span class="comment-content-footer-timestamp">2018-01-20 14:05</span>
					</p>
				</div>
				<div class="cls"></div>
			</div>
			<div class="comment comment-bottom">
				<div class="comment-content">
					<p class="comment-content-name">bilibili英雄聯盟賽事</p>
					<p class="comment-content-article">Hello World!</p>
					<p class="comment-content-footer">
						<span class="comment-content-footer-id">#1</span>
						<span class="comment-content-footer-timestamp">2018-01-20 13:10</span>
					</p>
				</div>
				<div class="cls"></div>
			</div>
		</div>
	</div>
</body>
</html>
